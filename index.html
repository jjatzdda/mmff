<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Интерактивная карта — 2D и 3D Глобус</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
        }

        #map-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        #map-container.dragging { cursor: grabbing; }
        #map-image {
            position: absolute;
            width: auto;
            height: auto;
            transform-origin: 0 0;
            pointer-events: none;
        }
        #markers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            margin-left: -20px;
            margin-top: -20px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s;
        }
        .marker:hover { transform: scale(1.1); }

        #globe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background-color: #000;
            display: none;
        }
        #globe-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .top-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 12px;
        }
        #reset-btn, #toggle-globe-btn, #toggle-shade-btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: rgba(255,255,255,0.9);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: black;
        }
        #reset-btn:hover, #toggle-globe-btn:hover, #toggle-shade-btn:hover { background-color: white; }
        #toggle-shade-btn {
            display: none;
        }

        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 600px;
            max-width: 90vw;
            height: 100%;
            background: white;
            box-shadow: -2px 0 15px rgba(0,0,0,0.3);
            z-index: 30;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
        }
        #sidebar.open { transform: translateX(0); }
        .close-btn {
            align-self: flex-end;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #sidebar-title { margin-bottom: 15px; font-size: 1.5rem; }
        .sidebar-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 15px 0;
            border-radius: 6px;
        }
        .sidebar-text {
            background-color: #f9f9f9;
            padding: 12px;
            border-left: 4px solid #007bff;
            line-height: 1.4;
        }

        .filter-menu-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 25;
        }
        .filter-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .filter-icon:hover { transform: scale(1.1); background-color: white; }
        .filter-icon svg { width: 24px; height: 24px; }
        .filter-panel {
            position: absolute;
            top: 60px;
            left: 0;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 200px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 26;
        }
        .filter-panel.open { display: flex; }
        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            color: black;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 0;
            min-width: 160px;
        }
        .filter-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .filter-option label {
            cursor: pointer;
            white-space: nowrap;
        }
        .error-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            z-index: 40;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <img id="map-image" src="map.jpg" alt="Карта">
        <div id="markers-container"></div>
    </div>
    <div id="globe-container">
        <canvas id="globe-canvas"></canvas>
    </div>
    <div class="top-buttons">
        <button id="reset-btn">Сбросить вид</button>
        <button id="toggle-shade-btn">Затенение</button>
        <button id="toggle-globe-btn">Глобус</button>
    </div>
    <div class="filter-menu-container">
        <div class="filter-icon" id="filter-icon">
            <svg class="icon-dots" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <svg class="icon-close" style="display: none;" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </div>
        <div class="filter-panel" id="filter-panel"></div>
    </div>
    <div id="sidebar">
        <button class="close-btn" id="close-sidebar">&times;</button>
        <h2 id="sidebar-title"></h2>
        <img id="sidebar-image" class="sidebar-image" style="display: none;" alt="">
        <div id="sidebar-text" class="sidebar-text"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== ОБЩИЕ ДАННЫЕ ==========
        let markersData = [];       
        let markerElements2D = [];    
        let categoriesSet = new Set();
        let activeCategories = new Set();
        let dataLoaded = false;

        // DOM элементы
        const container = document.getElementById('map-container');
        const mapImg = document.getElementById('map-image');
        const resetBtn = document.getElementById('reset-btn');
        const markersContainer = document.getElementById('markers-container');
        const globeContainer = document.getElementById('globe-container');
        const toggleGlobeBtn = document.getElementById('toggle-globe-btn');
        const toggleShadeBtn = document.getElementById('toggle-shade-btn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarImage = document.getElementById('sidebar-image');
        const sidebarText = document.getElementById('sidebar-text');
        const filterIcon = document.getElementById('filter-icon');
        const filterPanel = document.getElementById('filter-panel');
        const globeCanvas = document.getElementById('globe-canvas');

        // 2D переменные
        let scale = 1, minScale = 1, maxScale = 5;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let startX = 0, startY = 0;
        let lastTranslateX = 0, lastTranslateY = 0;

        // 3D переменные
        let globeMode = false;
        let scene, camera, renderer, controls, globeSphere;
        let markers3D = [];
        let markerIndices = [];
        let animationId = null;
        let shadeEnabled = true;      // затенение включено по умолчанию
        let planeNormal = null;
        let planeConstant = null;

        // ========== 2D ФУНКЦИИ ==========
        function updateMarkers2D() {
            markerElements2D.forEach((marker, i) => {
                if (i >= markersData.length) return;
                const data = markersData[i];
                const x = data.imgX * scale + translateX;
                const y = data.imgY * scale + translateY;
                marker.style.left = x + 'px';
                marker.style.top = y + 'px';
            });
        }

        function updateTransform2D() {
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            updateMarkers2D();
        }

        function setCoverAndCenter2D() {
            const rect = container.getBoundingClientRect();
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            if (!imgW || !imgH) return;
            const scaleX = rect.width / imgW;
            const scaleY = rect.height / imgH;
            minScale = Math.max(scaleX, scaleY);
            scale = minScale;
            translateX = (rect.width - imgW * scale) / 2;
            translateY = (rect.height - imgH * scale) / 2;
            updateTransform2D();
        }

        function clampTranslate2D() {
            const rect = container.getBoundingClientRect();
            const imgW = mapImg.naturalWidth * scale;
            const imgH = mapImg.naturalHeight * scale;
            const minX = rect.width - imgW;
            const maxX = 0;
            const minY = rect.height - imgH;
            const maxY = 0;
            translateX = Math.min(maxX, Math.max(minX, translateX));
            translateY = Math.min(maxY, Math.max(minY, translateY));
        }

        function applyFilter() {
            markerElements2D.forEach((marker, idx) => {
                const category = markersData[idx].category;
                marker.style.display = activeCategories.has(category) ? 'block' : 'none';
            });
            if (globeMode && markers3D.length) update3DMarkersVisibility();
        }

        function update3DMarkersVisibility() {
            for (let i = 0; i < markers3D.length; i++) {
                const idx = markerIndices[i];
                const category = markersData[idx].category;
                markers3D[i].userData.categoryVisible = activeCategories.has(category);
            }
            updateCombinedVisibility();
        }

        function updateCombinedVisibility() {
            if (!camera) return;
            const cameraPos = camera.position.clone().normalize();
            for (let i = 0; i < markers3D.length; i++) {
                const m = markers3D[i];
                const catVisible = m.userData.categoryVisible;
                if (!catVisible) {
                    m.visible = false;
                    continue;
                }
                const markerPos = m.position.clone().normalize();
                const dot = markerPos.dot(cameraPos);
                m.visible = (dot > 0);
            }
        }

        function buildFilterMenu() {
            filterPanel.innerHTML = '';
            const categories = Array.from(categoriesSet).sort();
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'filter-option';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = cat;
                checkbox.checked = activeCategories.has(cat);
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) activeCategories.add(cat);
                    else activeCategories.delete(cat);
                    applyFilter();
                });
                const label = document.createElement('label');
                label.textContent = cat;
                div.appendChild(checkbox);
                div.appendChild(label);
                filterPanel.appendChild(div);
            });
        }

        function openSidebar(index) {
            if (!markersData[index]) return;
            const data = markersData[index];
            sidebarTitle.textContent = data.name;
            sidebarText.textContent = data.description || 'Описание отсутствует';
            if (data.imageUrl && data.imageUrl.trim() !== '') {
                sidebarImage.src = data.imageUrl;
                sidebarImage.alt = data.name;
                sidebarImage.style.display = 'block';
            } else {
                sidebarImage.style.display = 'none';
            }
            sidebar.classList.add('open');
        }

        // ========== ЗАГРУЗКА EXCEL ==========
        async function loadMarkersFromExcel() {
            try {
                const response = await fetch('data.xlsx');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                if (!rows || rows.length < 2) throw new Error('Таблица пуста');

                markersContainer.innerHTML = '';
                markersData = [];
                markerElements2D = [];
                categoriesSet.clear();
                activeCategories.clear();

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const name = row[0] ? row[0].toString().trim() : '';
                    const coordsStr = row[1] ? row[1].toString().trim() : '';
                    const imageUrl = row[2] ? row[2].toString().trim() : '';
                    const description = row[3] ? row[3].toString().trim() : '';
                    const icon = row[4] ? row[4].toString().trim() : '';
                    const category = row[5] ? row[5].toString().trim() : 'Без категории';
                    if (!name && !coordsStr) continue;
                    const coords = coordsStr.split(';');
                    if (coords.length !== 2) continue;
                    const imgX = parseFloat(coords[0]);
                    const imgY = parseFloat(coords[1]);
                    if (isNaN(imgX) || isNaN(imgY)) continue;
                    
                    const markerData = {
                        name: name || 'Без названия',
                        imgX, imgY,
                        description: description || '',
                        imageUrl: imageUrl || '',
                        icon: icon || '',
                        category: category
                    };
                    markersData.push(markerData);
                    categoriesSet.add(markerData.category);
                    activeCategories.add(markerData.category);
                    
                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    if (markerData.icon) {
                        marker.style.backgroundImage = `url('${markerData.icon}')`;
                        marker.style.backgroundColor = 'transparent';
                        marker.style.border = 'none';
                        marker.style.boxShadow = 'none';
                    } else {
                        marker.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
                        marker.style.border = '3px solid white';
                        marker.style.borderRadius = '50%';
                        marker.style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
                    }
                    marker.dataset.index = markersData.length - 1;
                    marker.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openSidebar(parseInt(marker.dataset.index));
                    });
                    markersContainer.appendChild(marker);
                    markerElements2D.push(marker);
                }
                if (markersData.length === 0) console.warn('Нет маркеров');
                buildFilterMenu();
                applyFilter();
                updateMarkers2D();
                dataLoaded = true;
            } catch (err) {
                console.error('Ошибка загрузки Excel:', err);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = 'Не удалось загрузить data.xlsx';
                document.body.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 5000);
                dataLoaded = false;
            }
        }

        // ========== РАСЧЁТ ПЛОСКОСТИ ДЛЯ ЗАТЕНЕНИЯ ==========
        function computeShadePlane() {
            const R = 1.8;
            // Северный полюс (верхняя точка изображения)
            const A = new THREE.Vector3(0, R, 0);
            // Южный полюс (нижняя точка)
            const B = new THREE.Vector3(0, -R, 0);
            // Точка C из координат (516,570) на текстуре
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            const u = 516 / imgW;
            const v = 570 / imgH;
            const theta = (u * 2 * Math.PI) - Math.PI;
            const phi = (Math.PI / 2) - (v * Math.PI);
            const C = new THREE.Vector3(
                R * Math.cos(phi) * Math.cos(theta),
                R * Math.sin(phi),
                R * Math.cos(phi) * Math.sin(theta)
            );
            // Векторы AB и AC
            const AB = new THREE.Vector3().subVectors(B, A);
            const AC = new THREE.Vector3().subVectors(C, A);
            let normal = new THREE.Vector3().crossVectors(AB, AC).normalize();
            // Уравнение плоскости: dot(normal, P) + d = 0, где d = -dot(normal, A)
            const d = -normal.dot(A);
            return { normal, constant: d };
        }

        // ========== СОЗДАНИЕ МАТЕРИАЛА СФЕРЫ С ЗАТЕНЕНИЕМ ==========
        function createGlobeMaterial(texture) {
            const { normal, constant } = computeShadePlane();
            planeNormal = normal.clone();
            planeConstant = constant;
            
            // Шейдерный материал на основе стандартного, но с модификацией цвета
            const vertexShader = `
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    gl_PointSize = 1.0;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `;
            
            const fragmentShader = `
                uniform sampler2D map;
                uniform vec3 u_planeNormal;
                uniform float u_planeConstant;
                uniform bool u_shadeEnabled;
                varying vec3 vNormal;
                
                void main() {
                    vec4 texColor = texture2D(map, vUv);
                    vec3 normal = normalize(vNormal);
                    float side = dot(normal, u_planeNormal) + u_planeConstant;
                    if (u_shadeEnabled && side < 0.0) {
                        texColor.rgb *= 0.35;   // затемнение
                    }
                    gl_FragColor = texColor;
                }
            `;
            
            const uniforms = {
                map: { value: texture },
                u_planeNormal: { value: planeNormal },
                u_planeConstant: { value: planeConstant },
                u_shadeEnabled: { value: shadeEnabled }
            };
            
            return new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                lights: false,  // отключаем стандартное освещение, чтобы цвет был точным
                side: THREE.DoubleSide
            });
        }
        
        function updateShadeUniforms() {
            if (globeSphere && globeSphere.material) {
                globeSphere.material.uniforms.u_shadeEnabled.value = shadeEnabled;
            }
        }

        // ========== 3D ГЛОБУС ==========
        function destroyGlobe() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (renderer) {
                renderer.dispose();
                renderer = null;
            }
            if (scene) {
                scene.clear();
                scene = null;
            }
            camera = null;
            controls = null;
            globeSphere = null;
            markers3D = [];
            markerIndices = [];
        }

        async function initGlobe() {
            if (!dataLoaded || markersData.length === 0) {
                console.warn("Данные не загружены");
                return false;
            }
            destroyGlobe();
            
            const width = globeContainer.clientWidth;
            const height = globeContainer.clientHeight;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(0, 0, 5);
            
            renderer = new THREE.WebGLRenderer({ canvas: globeCanvas, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 1.0;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.minDistance = 2.2;
            controls.maxDistance = 8.0;
            controls.target.set(0, 0, 0);
            
            // Сфера с текстурой и шейдером затенения
            const geometry = new THREE.SphereGeometry(1.8, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            const mapTexture = await new Promise((resolve) => {
                const tex = textureLoader.load('map.jpg', () => resolve(tex));
            });
            const material = createGlobeMaterial(mapTexture);
            globeSphere = new THREE.Mesh(geometry, material);
            scene.add(globeSphere);
            
            // Маркеры
            markers3D = [];
            markerIndices = [];
            const sphereRadius = 1.81;
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            
            for (let i = 0; i < markersData.length; i++) {
                const data = markersData[i];
                let u = data.imgX / imgW;
                let v = data.imgY / imgH;
                const theta = (u * 2 * Math.PI) - Math.PI;
                const phi = (Math.PI / 2) - (v * Math.PI);
                const x = sphereRadius * Math.cos(phi) * Math.cos(theta);
                const y = sphereRadius * Math.sin(phi);
                const z = sphereRadius * Math.cos(phi) * Math.sin(theta);
                
                let markerObj;
                if (data.icon && data.icon.trim() !== '') {
                    const imgTexture = textureLoader.load(data.icon);
                    const spriteMat = new THREE.SpriteMaterial({ map: imgTexture, depthTest: false });
                    markerObj = new THREE.Sprite(spriteMat);
                    markerObj.scale.set(0.22, 0.22, 0.22);
                } else {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ff5555';
                    ctx.beginPath();
                    ctx.arc(32, 32, 28, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 30px Arial';
                    ctx.fillText('📍', 20, 48);
                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
                    markerObj = new THREE.Sprite(spriteMat);
                    markerObj.scale.set(0.22, 0.22, 0.22);
                }
                markerObj.position.set(x, y, z);
                markerObj.userData = { index: i, name: data.name, categoryVisible: true };
                scene.add(markerObj);
                markers3D.push(markerObj);
                markerIndices.push(i);
            }
            
            update3DMarkersVisibility();
            
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const clickHandler = (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(markers3D);
                if (intersects.length > 0) {
                    const idx = intersects[0].object.userData.index;
                    if (idx !== undefined) openSidebar(idx);
                }
            };
            renderer.domElement.addEventListener('click', clickHandler);
            
            function animate() {
                if (!globeMode) return;
                animationId = requestAnimationFrame(animate);
                controls.update();
                updateCombinedVisibility();
                renderer.render(scene, camera);
            }
            animate();
            
            return true;
        }
        
        function resetGlobeView() {
            if (!globeMode || !controls || !camera) return;
            camera.position.set(0, 0, 5);
            controls.target.set(0, 0, 0);
            controls.update();
        }
        
        function toggleShade() {
            shadeEnabled = !shadeEnabled;
            toggleShadeBtn.textContent = shadeEnabled ? "Затенение" : "Затенение выкл";
            updateShadeUniforms();
        }
        
        async function toggleGlobeMode() {
            if (!dataLoaded) {
                alert("Данные ещё загружаются...");
                return;
            }
            if (!globeMode) {
                globeMode = true;
                toggleGlobeBtn.textContent = "Карта";
                toggleShadeBtn.style.display = "inline-block";
                container.style.display = "none";
                globeContainer.style.display = "block";
                await initGlobe();
                resetBtn.onclick = () => { if (globeMode) resetGlobeView(); else setCoverAndCenter2D(); };
                toggleShadeBtn.onclick = toggleShade;
            } else {
                globeMode = false;
                toggleGlobeBtn.textContent = "Глобус";
                toggleShadeBtn.style.display = "none";
                globeContainer.style.display = "none";
                container.style.display = "block";
                destroyGlobe();
                setCoverAndCenter2D();
                updateMarkers2D();
                resetBtn.onclick = setCoverAndCenter2D;
            }
        }
        
        // ========== 2D СОБЫТИЯ ==========
        function init2DEvents() {
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const imgX = (mouseX - translateX) / scale;
                const imgY = (mouseY - translateY) / scale;
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                let newScale = scale + delta;
                if (newScale < minScale) newScale = minScale;
                if (newScale > maxScale) newScale = maxScale;
                scale = newScale;
                translateX = mouseX - imgX * scale;
                translateY = mouseY - imgY * scale;
                clampTranslate2D();
                updateTransform2D();
            }, { passive: false });
            
            container.addEventListener('mousedown', (e) => {
                e.preventDefault();
                isDragging = true;
                container.classList.add('dragging');
                startX = e.clientX;
                startY = e.clientY;
                lastTranslateX = translateX;
                lastTranslateY = translateY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                translateX = lastTranslateX + dx;
                translateY = lastTranslateY + dy;
                clampTranslate2D();
                updateTransform2D();
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
                container.classList.remove('dragging');
            });
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    e.preventDefault();
                    isDragging = true;
                    container.classList.add('dragging');
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    lastTranslateX = translateX;
                    lastTranslateY = translateY;
                }
            });
            window.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                translateX = lastTranslateX + dx;
                translateY = lastTranslateY + dy;
                clampTranslate2D();
                updateTransform2D();
            });
            window.addEventListener('touchend', () => {
                isDragging = false;
                container.classList.remove('dragging');
            });
            resetBtn.onclick = setCoverAndCenter2D;
            window.addEventListener('resize', () => {
                if (!globeMode && mapImg.complete) setCoverAndCenter2D();
                else if (globeMode && renderer && camera) {
                    const width = globeContainer.clientWidth;
                    const height = globeContainer.clientHeight;
                    renderer.setSize(width, height);
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                }
            });
        }
        
        // ========== ОСТАЛЬНЫЕ ИНТЕРАКЦИИ ==========
        closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !e.target.classList?.contains('marker') && !e.target.classList?.contains('sprite')) {
                sidebar.classList.remove('open');
            }
        });
        
        let filterMenuOpen = false;
        filterIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            filterMenuOpen = !filterMenuOpen;
            const iconDots = document.querySelector('.icon-dots');
            const iconClose = document.querySelector('.icon-close');
            if (filterMenuOpen) {
                filterPanel.classList.add('open');
                iconDots.style.display = 'none';
                iconClose.style.display = 'block';
            } else {
                filterPanel.classList.remove('open');
                iconDots.style.display = 'block';
                iconClose.style.display = 'none';
            }
        });
        document.addEventListener('click', (e) => {
            if (!filterIcon.contains(e.target) && !filterPanel.contains(e.target) && filterMenuOpen) {
                filterMenuOpen = false;
                filterPanel.classList.remove('open');
                const iconDots = document.querySelector('.icon-dots');
                const iconClose = document.querySelector('.icon-close');
                if (iconDots && iconClose) {
                    iconDots.style.display = 'block';
                    iconClose.style.display = 'none';
                }
            }
        });
        
        toggleGlobeBtn.addEventListener('click', toggleGlobeMode);
        toggleShadeBtn.addEventListener('click', toggleShade);
        toggleShadeBtn.style.display = "none";
        
        if (mapImg.complete) setCoverAndCenter2D();
        else mapImg.onload = setCoverAndCenter2D;
        loadMarkersFromExcel();
        init2DEvents();
    </script>
</body>
</html>
