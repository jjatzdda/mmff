<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Интерактивная карта — 2D и 3D Глобус</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        /* ... стили без изменений, как в предыдущей версии ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
        }
        #map-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        #map-container.dragging { cursor: grabbing; }
        #map-image {
            position: absolute;
            width: auto;
            height: auto;
            transform-origin: 0 0;
            pointer-events: none;
        }
        #markers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            margin-left: -20px;
            margin-top: -20px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s;
        }
        .marker:hover { transform: scale(1.1); }
        #globe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background-color: #000;
            display: none;
        }
        #globe-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .top-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 12px;
        }
        #reset-btn, #toggle-globe-btn, #toggle-shade-btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: rgba(255,255,255,0.9);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: black;
        }
        #reset-btn:hover, #toggle-globe-btn:hover, #toggle-shade-btn:hover { background-color: white; }
        #toggle-shade-btn { display: none; }
        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 600px;
            max-width: 90vw;
            height: 100%;
            background: white;
            box-shadow: -2px 0 15px rgba(0,0,0,0.3);
            z-index: 30;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
        }
        #sidebar.open { transform: translateX(0); }
        .close-btn {
            align-self: flex-end;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #sidebar-title { margin-bottom: 15px; font-size: 1.5rem; }
        .sidebar-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 15px 0;
            border-radius: 6px;
        }
        .sidebar-text {
            background-color: #f9f9f9;
            padding: 12px;
            border-left: 4px solid #007bff;
            line-height: 1.4;
        }
        .filter-menu-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 25;
        }
        .filter-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .filter-icon:hover { transform: scale(1.1); background-color: white; }
        .filter-icon svg { width: 24px; height: 24px; }
        .filter-panel {
            position: absolute;
            top: 60px;
            left: 0;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 200px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 26;
        }
        .filter-panel.open { display: flex; }
        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            color: black;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 0;
            min-width: 160px;
        }
        .filter-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .filter-option label {
            cursor: pointer;
            white-space: nowrap;
        }
        .error-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            z-index: 40;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- тот же HTML, без изменений -->
    <div id="map-container">
        <img id="map-image" src="map.jpg" alt="Карта">
        <div id="markers-container"></div>
    </div>
    <div id="globe-container">
        <canvas id="globe-canvas"></canvas>
    </div>
    <div class="top-buttons">
        <button id="reset-btn">Сбросить вид</button>
        <button id="toggle-shade-btn">Затенение</button>
        <button id="toggle-globe-btn">Глобус</button>
    </div>
    <div class="filter-menu-container">
        <div class="filter-icon" id="filter-icon">
            <svg class="icon-dots" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <svg class="icon-close" style="display: none;" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </div>
        <div class="filter-panel" id="filter-panel"></div>
    </div>
    <div id="sidebar">
        <button class="close-btn" id="close-sidebar">&times;</button>
        <h2 id="sidebar-title"></h2>
        <img id="sidebar-image" class="sidebar-image" style="display: none;" alt="">
        <div id="sidebar-text" class="sidebar-text"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== ОБЩИЕ ДАННЫЕ ==========
        let markersData = [];       
        let markerElements2D = [];    
        let categoriesSet = new Set();
        let activeCategories = new Set();
        let dataLoaded = false;

        // DOM элементы
        const container = document.getElementById('map-container');
        const mapImg = document.getElementById('map-image');
        const resetBtn = document.getElementById('reset-btn');
        const markersContainer = document.getElementById('markers-container');
        const globeContainer = document.getElementById('globe-container');
        const toggleGlobeBtn = document.getElementById('toggle-globe-btn');
        const toggleShadeBtn = document.getElementById('toggle-shade-btn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarImage = document.getElementById('sidebar-image');
        const sidebarText = document.getElementById('sidebar-text');
        const filterIcon = document.getElementById('filter-icon');
        const filterPanel = document.getElementById('filter-panel');
        const globeCanvas = document.getElementById('globe-canvas');

        // 2D переменные
        let scale = 1, minScale = 1, maxScale = 5;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let startX = 0, startY = 0;
        let lastTranslateX = 0, lastTranslateY = 0;

        // 3D переменные
        let globeMode = false;
        let scene, camera, renderer, controls, globeSphere;
        let markers3D = [];
        let markerIndices = [];
        let animationId = null;
        let shadeEnabled = true;
        let planeNormal, planeConstant;
        
        // Сохранение состояния камеры
        let savedGlobePosition = null;
        let savedGlobeTarget = null;
        let isFirstGlobeActivation = true;

        // ========== 2D ФУНКЦИИ (без изменений) ==========
        function updateMarkers2D() { /* ... */ }
        function updateTransform2D() { /* ... */ }
        function setCoverAndCenter2D() { /* ... */ }
        function clampTranslate2D() { /* ... */ }
        function applyFilter() { /* ... */ }
        function update3DMarkersVisibility() { /* ... */ }
        function updateCombinedVisibility() { /* ... */ }
        function buildFilterMenu() { /* ... */ }
        function openSidebar(index) { /* ... */ }

        // ... (остальные 2D функции остаются без изменений, я их скопирую из предыдущего рабочего кода) ...
        // Для краткости в ответе приведу только изменённые и новые части, но в итоговом файле они будут на своих местах.

        // ========== ИСПРАВЛЕННОЕ ВЫЧИСЛЕНИЕ ПЛОСКОСТИ ==========
        function computeShadePlane() {
            const R = 1.8;
            // Северный полюс (верх изображения)
            const A = new THREE.Vector3(0, R, 0);
            // Южный полюс (низ изображения)
            const B = new THREE.Vector3(0, -R, 0);
            // Точка на текстуре (516,570)
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            const u = 516 / imgW;
            const v = 570 / imgH;
            const theta = (u * 2 * Math.PI) - Math.PI;
            const phi = (Math.PI / 2) - (v * Math.PI);
            const C = new THREE.Vector3(
                R * Math.cos(phi) * Math.cos(theta),
                R * Math.sin(phi),
                R * Math.cos(phi) * Math.sin(theta)
            );
            // Векторы AB и AC
            const AB = new THREE.Vector3().subVectors(B, A);
            const AC = new THREE.Vector3().subVectors(C, A);
            let normal = new THREE.Vector3().crossVectors(AB, AC).normalize();
            // Вычисляем d для уравнения плоскости: normal·P + d = 0
            let d = -normal.dot(A);
            
            // Проверяем знак для точки "Море Восточное" (488,617) — должна быть в затенённой полусфере (side < 0)
            const uTest = 488 / imgW;
            const vTest = 617 / imgH;
            const thetaTest = (uTest * 2 * Math.PI) - Math.PI;
            const phiTest = (Math.PI / 2) - (vTest * Math.PI);
            const testPoint = new THREE.Vector3(
                R * Math.cos(phiTest) * Math.cos(thetaTest),
                R * Math.sin(phiTest),
                R * Math.cos(phiTest) * Math.sin(thetaTest)
            );
            let testSide = normal.dot(testPoint) + d;
            // Если testSide > 0, то инвертируем нормаль, чтобы testSide стал отрицательным
            if (testSide > 0) {
                normal.negate();
                d = -normal.dot(A);
                testSide = normal.dot(testPoint) + d;
            }
            console.log(`Плоскость: нормаль ${normal.x.toFixed(3)},${normal.y.toFixed(3)},${normal.z.toFixed(3)}, d=${d.toFixed(3)}, testSide=${testSide.toFixed(3)} (должен быть <0)`);
            return { normal, constant: d };
        }

        // ========== СОЗДАНИЕ МАТЕРИАЛА СФЕРЫ (без изменений, но использует глобальные planeNormal/constant) ==========
        function createGlobeMaterial(texture) {
            const { normal, constant } = computeShadePlane();
            planeNormal = normal.clone();
            planeConstant = constant;
            
            const vertexShader = `
                varying vec3 vNormal;
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 1.0;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `;
            const fragmentShader = `
                uniform sampler2D map;
                uniform vec3 u_planeNormal;
                uniform float u_planeConstant;
                uniform bool u_shadeEnabled;
                varying vec2 vUv;
                varying vec3 vNormal;
                
                void main() {
                    vec4 texColor = texture2D(map, vUv);
                    vec3 normal = normalize(vNormal);
                    float side = dot(normal, u_planeNormal) + u_planeConstant;
                    if (u_shadeEnabled && side < 0.0) {
                        texColor.rgb *= 0.35;
                    }
                    gl_FragColor = texColor;
                }
            `;
            const uniforms = {
                map: { value: texture },
                u_planeNormal: { value: planeNormal },
                u_planeConstant: { value: planeConstant },
                u_shadeEnabled: { value: shadeEnabled }
            };
            return new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                lights: false,
                side: THREE.DoubleSide
            });
        }
        
        function updateShadeUniforms() {
            if (globeSphere && globeSphere.material) {
                globeSphere.material.uniforms.u_shadeEnabled.value = shadeEnabled;
            }
        }

        // ========== 3D ГЛОБУС (с сохранением состояния камеры и начальным поворотом) ==========
        function destroyGlobe() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (renderer) {
                renderer.dispose();
                renderer = null;
            }
            if (scene) {
                scene.clear();
                scene = null;
            }
            camera = null;
            controls = null;
            globeSphere = null;
            markers3D = [];
            markerIndices = [];
        }

        // Установка камеры на незатенённую полусферу (side > 0)
        function setDefaultGlobeView() {
            if (!controls || !camera) return;
            // Направление на незатенённую полусферу — это нормаль плоскости, указывающая в сторону side > 0
            // Поскольку в computeShadePlane мы сделали так, что testSide < 0 для затенённой части,
            // то незатенённая часть — это side > 0, и её нормаль совпадает с planeNormal.
            const viewDir = planeNormal.clone().normalize();
            camera.position.copy(viewDir.multiplyScalar(5));
            controls.target.set(0, 0, 0);
            controls.update();
        }

        function resetGlobeView() {
            if (!globeMode || !controls || !camera) return;
            setDefaultGlobeView();
            // Сохраняем это состояние как последнее
            savedGlobePosition = camera.position.clone();
            savedGlobeTarget = controls.target.clone();
        }

        async function initGlobe(resetView = true) {
            if (!dataLoaded || markersData.length === 0) {
                console.warn("Данные не загружены");
                return false;
            }
            destroyGlobe();
            
            const width = globeContainer.clientWidth;
            const height = globeContainer.clientHeight;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas: globeCanvas, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 1.0;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.minDistance = 2.2;
            controls.maxDistance = 8.0;
            controls.target.set(0, 0, 0);
            
            // Сфера с текстурой
            const geometry = new THREE.SphereGeometry(1.8, 128, 128);
            const textureLoader = new THREE.TextureLoader();
            const mapTexture = await new Promise((resolve) => {
                const tex = textureLoader.load('map.jpg', () => resolve(tex));
            });
            const material = createGlobeMaterial(mapTexture);
            globeSphere = new THREE.Mesh(geometry, material);
            scene.add(globeSphere);
            
            // Маркеры (как раньше)
            markers3D = [];
            markerIndices = [];
            const sphereRadius = 1.81;
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            for (let i = 0; i < markersData.length; i++) {
                const data = markersData[i];
                let u = data.imgX / imgW;
                let v = data.imgY / imgH;
                const theta = (u * 2 * Math.PI) - Math.PI;
                const phi = (Math.PI / 2) - (v * Math.PI);
                const x = sphereRadius * Math.cos(phi) * Math.cos(theta);
                const y = sphereRadius * Math.sin(phi);
                const z = sphereRadius * Math.cos(phi) * Math.sin(theta);
                
                let markerObj;
                if (data.icon && data.icon.trim() !== '') {
                    const imgTexture = textureLoader.load(data.icon);
                    const spriteMat = new THREE.SpriteMaterial({ map: imgTexture, depthTest: false });
                    markerObj = new THREE.Sprite(spriteMat);
                    markerObj.scale.set(0.22, 0.22, 0.22);
                } else {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ff5555';
                    ctx.beginPath();
                    ctx.arc(32, 32, 28, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 30px Arial';
                    ctx.fillText('📍', 20, 48);
                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
                    markerObj = new THREE.Sprite(spriteMat);
                    markerObj.scale.set(0.22, 0.22, 0.22);
                }
                markerObj.position.set(x, y, z);
                markerObj.userData = { index: i, name: data.name, categoryVisible: true };
                scene.add(markerObj);
                markers3D.push(markerObj);
                markerIndices.push(i);
            }
            
            update3DMarkersVisibility();
            
            // Обработка кликов
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const clickHandler = (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(markers3D);
                if (intersects.length > 0) {
                    const idx = intersects[0].object.userData.index;
                    if (idx !== undefined) openSidebar(idx);
                }
            };
            renderer.domElement.addEventListener('click', clickHandler);
            
            // Установка вида камеры
            if (resetView || isFirstGlobeActivation || !savedGlobePosition) {
                setDefaultGlobeView();
                isFirstGlobeActivation = false;
                savedGlobePosition = camera.position.clone();
                savedGlobeTarget = controls.target.clone();
            } else {
                camera.position.copy(savedGlobePosition);
                controls.target.copy(savedGlobeTarget);
                controls.update();
            }
            
            function animate() {
                if (!globeMode) return;
                animationId = requestAnimationFrame(animate);
                controls.update();
                updateCombinedVisibility();
                renderer.render(scene, camera);
            }
            animate();
            
            return true;
        }
        
        async function toggleGlobeMode() {
            if (!dataLoaded) {
                alert("Данные ещё загружаются...");
                return;
            }
            if (!globeMode) {
                // Сохраняем текущее состояние 2D (фильтры, положение карты) - они уже хранятся в переменных
                globeMode = true;
                toggleGlobeBtn.textContent = "Карта";
                toggleShadeBtn.style.display = "inline-block";
                container.style.display = "none";
                globeContainer.style.display = "block";
                // При переключении на глобус не сбрасываем вид, если уже был инициализирован ранее
                await initGlobe(false);
                resetBtn.onclick = () => { if (globeMode) resetGlobeView(); else setCoverAndCenter2D(); };
                toggleShadeBtn.onclick = () => {
                    shadeEnabled = !shadeEnabled;
                    toggleShadeBtn.textContent = shadeEnabled ? "Затенение" : "Затенение выкл";
                    updateShadeUniforms();
                };
                toggleShadeBtn.textContent = shadeEnabled ? "Затенение" : "Затенение выкл";
            } else {
                // Сохраняем состояние камеры глобуса перед выключением
                if (controls && camera) {
                    savedGlobePosition = camera.position.clone();
                    savedGlobeTarget = controls.target.clone();
                }
                globeMode = false;
                toggleGlobeBtn.textContent = "Глобус";
                toggleShadeBtn.style.display = "none";
                globeContainer.style.display = "none";
                container.style.display = "block";
                destroyGlobe();
                // Восстанавливаем 2D состояние (фильтры, положение)
                applyFilter();          // фильтры уже активны
                setCoverAndCenter2D();  // возвращаем масштаб и позицию карты
                updateMarkers2D();
                resetBtn.onclick = setCoverAndCenter2D;
            }
        }
        
        // ========== 2D СОБЫТИЯ (без изменений, но нужно скопировать из предыдущей версии) ==========
        function init2DEvents() { /* ... полная реализация из предыдущего кода ... */ }
        
        // ========== ОСТАЛЬНЫЕ ИНТЕРАКЦИИ ==========
        // ... закрытие сайдбара, меню фильтров и т.д. (без изменений)
        
        // Запуск
        if (mapImg.complete) setCoverAndCenter2D();
        else mapImg.onload = setCoverAndCenter2D;
        loadMarkersFromExcel();
        init2DEvents();
        
        // Дополнительно: при загрузке изображения карты пересчитать плоскость, если глобус активен
        mapImg.onload = () => {
            setCoverAndCenter2D();
            if (globeMode && globeSphere) {
                // Обновить материал с новой плоскостью
                const newMat = createGlobeMaterial(globeSphere.material.uniforms.map.value);
                globeSphere.material.dispose();
                globeSphere.material = newMat;
                updateShadeUniforms();
            }
        };
    </script>
</body>
