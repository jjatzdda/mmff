<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Интерактивная карта Луны — 2D и 3D Глобус (ИСПРАВЛЕНО ПОЛНОСТЬЮ)</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map-container { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: grab; }
        #map-container.dragging { cursor: grabbing; }
        #map-image { position: absolute; width: auto; height: auto; transform-origin: 0 0; pointer-events: none; }
        #markers-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .marker {
            position: absolute; width: 40px; height: 40px; margin-left: -20px; margin-top: -20px;
            background-size: contain; background-position: center; background-repeat: no-repeat;
            cursor: pointer; pointer-events: auto; transition: transform 0.1s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .marker:hover { transform: scale(1.15); z-index: 100; }
        #globe-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; background-color: #000; display: none; }
        #globe-canvas { width: 100%; height: 100%; display: block; }
        .top-buttons {
            position: absolute; top: 20px; right: 20px; z-index: 20; display: flex; gap: 12px;
        }
        #reset-btn, #toggle-globe-btn, #toggle-shade-btn {
            padding: 10px 20px; font-size: 16px; font-weight: 500; border: none;
            background-color: rgba(255,255,255,0.9); color: black; border-radius: 8px;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #reset-btn:hover, #toggle-globe-btn:hover, #toggle-shade-btn:hover { background-color: white; transform: scale(1.02); }
        #toggle-shade-btn { display: none; }
        .filter-menu-container { position: absolute; top: 20px; left: 20px; z-index: 25; }
        .filter-icon {
            width: 48px; height: 48px; background-color: rgba(255,255,255,0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .filter-icon:hover { transform: scale(1.08); background-color: white; }
        .filter-icon svg { width: 26px; height: 26px; fill: black; }
        .filter-panel {
            position: absolute; top: 60px; left: 0; background: rgba(255,255,255,0.95);
            border-radius: 16px; padding: 12px 16px; min-width: 220px; display: none;
            flex-direction: column; gap: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1); z-index: 26; backdrop-filter: blur(4px);
        }
        .filter-panel.open { display: flex; }
        .filter-option {
            display: flex; align-items: center; gap: 12px; color: black; font-size: 14px;
            cursor: pointer; padding: 6px 8px; border-radius: 12px; transition: background 0.1s;
        }
        .filter-option:hover { background: rgba(0,0,0,0.05); }
        .filter-option input { width: 18px; height: 18px; cursor: pointer; accent-color: #007bff; }
        .filter-option label { cursor: pointer; font-weight: 400; }
        #sidebar {
            position: fixed; top: 0; right: 0; width: 520px; max-width: 90vw; height: 100%;
            background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.3); z-index: 30;
            padding: 24px; display: flex; flex-direction: column; transform: translateX(100%);
            transition: transform 0.3s ease; overflow-y: auto; color: #1e1e2a;
        }
        #sidebar.open { transform: translateX(0); }
        .close-btn {
            align-self: flex-end; font-size: 32px; background: none; border: none;
            cursor: pointer; margin-bottom: 15px; color: #333; opacity: 0.7;
        }
        .close-btn:hover { opacity: 1; }
        #sidebar-title { margin-bottom: 20px; font-size: 1.8rem; font-weight: 600; border-left: 4px solid #007bff; padding-left: 16px; }
        .sidebar-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 15px 0;
            border-radius: 8px;
            background: transparent;
        }
        .sidebar-text { background: #f9f9f9; padding: 18px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem; color: #222; margin-top: 10px; border-left: 4px solid #007bff; }
        .error-message { position: fixed; bottom: 20px; left: 20px; background: #dc2626; color: white; padding: 10px 18px; border-radius: 40px; z-index: 40; font-size: 14px; }
    </style>
</head>
<body>
    <div id="map-container">
        <img id="map-image" src="map.jpg" alt="Карта Луны">
        <div id="markers-container"></div>
    </div>
    <div id="globe-container">
        <canvas id="globe-canvas"></canvas>
    </div>
    <div class="top-buttons">
        <button id="reset-btn">Сбросить вид</button>
        <button id="toggle-shade-btn">Затенение</button>
        <button id="toggle-globe-btn">Глобус</button>
    </div>
    <div class="filter-menu-container">
        <div class="filter-icon" id="filter-icon">
            <svg class="icon-dots" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <svg class="icon-close" style="display: none;" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </div>
        <div class="filter-panel" id="filter-panel"></div>
    </div>
    <div id="sidebar">
        <button class="close-btn" id="close-sidebar">&times;</button>
        <h2 id="sidebar-title"></h2>
        <img id="sidebar-image" class="sidebar-image" style="display: none;" alt="">
        <div id="sidebar-text" class="sidebar-text"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== ГЛОБАЛЬНЫЕ ДАННЫЕ ====================
        let markersData = [];          // все маркеры из Excel
        let markerElements2D = [];     // DOM-элементы маркеров на плоской карте
        let categoriesSet = new Set();
        let activeCategories = new Set();
        let dataLoaded = false;
        let mapImageReady = false;
        let mapImageSize = { width: 0, height: 0 };
        
        // DOM элементы
        const container = document.getElementById('map-container');
        const mapImg = document.getElementById('map-image');
        const resetBtn = document.getElementById('reset-btn');
        const markersContainer = document.getElementById('markers-container');
        const globeContainer = document.getElementById('globe-container');
        const toggleGlobeBtn = document.getElementById('toggle-globe-btn');
        const toggleShadeBtn = document.getElementById('toggle-shade-btn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarImage = document.getElementById('sidebar-image');
        const sidebarText = document.getElementById('sidebar-text');
        const filterIcon = document.getElementById('filter-icon');
        const filterPanel = document.getElementById('filter-panel');
        const globeCanvas = document.getElementById('globe-canvas');
        
        // 2D переменные
        let scale = 1, minScale = 1, maxScale = 5;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let startX = 0, startY = 0;
        let lastTranslateX = 0, lastTranslateY = 0;
        
        // 3D переменные
        let globeMode = false;
        let scene, camera, renderer, controls, globeSphere;
        let markers3D = [];           // массив 3D спрайтов
        let animationId = null;
        let shadeEnabled = true;
        let planeNormal = null, planeConstant = null;
        let savedGlobePos = null, savedGlobeTarget = null;
        let firstGlobe = true;
        
        // ==================== ЗАГРУЗКА КАРТЫ ====================
        function waitForMap() {
            return new Promise((resolve) => {
                if (mapImg.complete && mapImg.naturalWidth > 0) {
                    mapImageSize = { width: mapImg.naturalWidth, height: mapImg.naturalHeight };
                    mapImageReady = true;
                    resolve();
                } else {
                    mapImg.onload = () => {
                        mapImageSize = { width: mapImg.naturalWidth, height: mapImg.naturalHeight };
                        mapImageReady = true;
                        resolve();
                    };
                    if (!mapImg.src) mapImg.src = "map.jpg";
                }
            });
        }
        
        // ==================== ПЛОСКОСТЬ ЗАТЕНЕНИЯ (шейдер) ====================
        function computeShadePlane() {
            if (!mapImageReady) return { normal: new THREE.Vector3(0,1,0), constant: -1.8 };
            const R = 1.8;
            const w = mapImageSize.width, h = mapImageSize.height;
            // Северный и южный полюса
            const A = new THREE.Vector3(0, R, 0);
            const B = new THREE.Vector3(0, -R, 0);
            // Контрольная точка: Море Восточное (488,617) - должно быть в тени
            const u = 488 / w;
            const v = 617 / h;
            const theta = u * Math.PI * 2 - Math.PI;
            const phi = Math.PI / 2 - v * Math.PI;
            const C = new THREE.Vector3(R * Math.cos(phi) * Math.cos(theta), R * Math.sin(phi), R * Math.cos(phi) * Math.sin(theta));
            const AB = new THREE.Vector3().subVectors(B, A);
            const AC = new THREE.Vector3().subVectors(C, A);
            let normal = new THREE.Vector3().crossVectors(AB, AC).normalize();
            let d = -normal.dot(A);
            if (normal.dot(C) + d > 0) {
                normal.negate();
                d = -normal.dot(A);
            }
            return { normal, constant: d };
        }
        
        function createGlobeMaterial(texture) {
            const { normal, constant } = computeShadePlane();
            planeNormal = normal.clone();
            planeConstant = constant;
            const vertexShader = `
                varying vec3 vLocalNormal;
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    vLocalNormal = normalize(normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `;
            const fragmentShader = `
                uniform sampler2D map;
                uniform vec3 u_planeNormal;
                uniform float u_planeConstant;
                uniform bool u_shadeEnabled;
                varying vec2 vUv;
                varying vec3 vLocalNormal;
                void main() {
                    vec4 texColor = texture2D(map, vUv);
                    if (u_shadeEnabled) {
                        float side = dot(vLocalNormal, u_planeNormal) + u_planeConstant;
                        if (side < 0.0) texColor.rgb *= 0.35;
                    }
                    gl_FragColor = texColor;
                }
            `;
            return new THREE.ShaderMaterial({
                uniforms: {
                    map: { value: texture },
                    u_planeNormal: { value: planeNormal },
                    u_planeConstant: { value: planeConstant },
                    u_shadeEnabled: { value: shadeEnabled }
                },
                vertexShader,
                fragmentShader,
                side: THREE.DoubleSide
            });
        }
        
        function updateShade() {
            if (globeSphere && globeSphere.material) {
                globeSphere.material.uniforms.u_shadeEnabled.value = shadeEnabled;
            }
        }
        
        // ==================== ФИЛЬТРАЦИЯ ====================
        function applyFilter() {
            markerElements2D.forEach((m, i) => {
                m.style.display = activeCategories.has(markersData[i].category) ? 'block' : 'none';
            });
            if (globeMode && markers3D.length) {
                markers3D.forEach(m => {
                    const cat = markersData[m.userData.index].category;
                    m.userData.visibleByCat = activeCategories.has(cat);
                });
                updateVisibility3D();
            }
        }
        
        function updateVisibility3D() {
            if (!camera) return;
            const camDir = camera.position.clone().normalize();
            markers3D.forEach(m => {
                if (!m.userData.visibleByCat) { m.visible = false; return; }
                const dir = m.position.clone().normalize();
                m.visible = (dir.dot(camDir) > 0);
            });
        }
        
        function buildFilterMenu() {
            filterPanel.innerHTML = '';
            Array.from(categoriesSet).sort().forEach(cat => {
                const div = document.createElement('div'); div.className = 'filter-option';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = cat; cb.checked = activeCategories.has(cat);
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) activeCategories.add(cat); else activeCategories.delete(cat);
                    applyFilter();
                });
                const label = document.createElement('label'); label.textContent = cat;
                div.appendChild(cb); div.appendChild(label); filterPanel.appendChild(div);
            });
        }
        
        function openSidebar(index) {
            const d = markersData[index];
            if (!d) return;
            sidebarTitle.textContent = d.name;
            sidebarText.textContent = d.description || 'Описание отсутствует';
            if (d.imageUrl && d.imageUrl.trim()) {
                sidebarImage.src = d.imageUrl;
                sidebarImage.alt = d.name;
                sidebarImage.style.display = 'block';
                sidebarImage.onerror = () => { sidebarImage.style.display = 'none'; };
            } else {
                sidebarImage.style.display = 'none';
            }
            sidebar.classList.add('open');
        }
        
        // ==================== 2D УПРАВЛЕНИЕ ====================
        function updateMarkers2D() {
            markerElements2D.forEach((m, i) => {
                const data = markersData[i];
                m.style.left = (data.imgX * scale + translateX) + 'px';
                m.style.top = (data.imgY * scale + translateY) + 'px';
            });
        }
        function updateTransform2D() {
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            updateMarkers2D();
        }
        function setCoverAndCenter2D() {
            if (!mapImageReady) return;
            const rect = container.getBoundingClientRect();
            const w = mapImageSize.width, h = mapImageSize.height;
            const sx = rect.width / w, sy = rect.height / h;
            minScale = Math.max(sx, sy);
            scale = minScale;
            translateX = (rect.width - w * scale) / 2;
            translateY = (rect.height - h * scale) / 2;
            updateTransform2D();
        }
        function clamp2D() {
            const rect = container.getBoundingClientRect();
            const w = mapImageSize.width * scale, h = mapImageSize.height * scale;
            translateX = Math.min(0, Math.max(rect.width - w, translateX));
            translateY = Math.min(0, Math.max(rect.height - h, translateY));
        }
        
        // ==================== ЗАГРУЗКА EXCEL ====================
        async function loadExcel() {
            try {
                const resp = await fetch('data.xlsx');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const ab = await resp.arrayBuffer();
                const wb = XLSX.read(ab, { type: 'array' });
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                if (!rows || rows.length < 2) throw new Error('Таблица пуста');
                markersContainer.innerHTML = '';
                markersData = []; markerElements2D = []; categoriesSet.clear(); activeCategories.clear();
                for (let i = 1; i < rows.length; i++) {
                    const r = rows[i];
                    const name = r[0] ? r[0].toString().trim() : '';
                    const coordsStr = r[1] ? r[1].toString().trim() : '';
                    const imgUrl = r[2] ? r[2].toString().trim() : '';
                    const desc = r[3] ? r[3].toString().trim() : '';
                    const icon = r[4] ? r[4].toString().trim() : '';
                    const category = r[5] ? r[5].toString().trim() : 'Без категории';
                    if (!name && !coordsStr) continue;
                    const parts = coordsStr.split(';');
                    if (parts.length !== 2) continue;
                    const x = parseFloat(parts[0]), y = parseFloat(parts[1]);
                    if (isNaN(x) || isNaN(y)) continue;
                    const marker = {
                        name: name || 'Без названия', imgX: x, imgY: y, description: desc,
                        imageUrl: imgUrl, icon: icon, category: category
                    };
                    markersData.push(marker);
                    categoriesSet.add(category);
                    activeCategories.add(category);
                    const div = document.createElement('div'); div.className = 'marker';
                    if (marker.icon) {
                        div.style.backgroundImage = `url('${marker.icon}')`;
                        div.style.backgroundColor = 'transparent';
                        div.style.border = 'none';
                    } else {
                        div.style.backgroundColor = '#ff4466';
                        div.style.border = '3px solid white';
                        div.style.borderRadius = '50%';
                        div.style.boxShadow = '0 0 12px rgba(255,68,102,0.8)';
                    }
                    div.dataset.index = markersData.length - 1;
                    div.addEventListener('click', (e) => { e.stopPropagation(); openSidebar(parseInt(div.dataset.index)); });
                    markersContainer.appendChild(div);
                    markerElements2D.push(div);
                }
                buildFilterMenu();
                applyFilter();
                updateMarkers2D();
                dataLoaded = true;
                console.log(`Загружено маркеров: ${markersData.length}`);
            } catch(e) {
                console.error(e);
                const errDiv = document.createElement('div'); errDiv.className = 'error-message';
                errDiv.textContent = '❌ Ошибка загрузки data.xlsx'; document.body.appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 5000);
                dataLoaded = false;
            }
        }
        
        // ==================== 3D ГЛОБУС (ПОЛНОСТЬЮ ПЕРЕРАБОТАН) ====================
        function destroyGlobe() {
            if (animationId) cancelAnimationFrame(animationId);
            if (renderer) renderer.dispose();
            if (scene) scene.clear();
            camera = null; controls = null; globeSphere = null; markers3D = [];
        }
        
        // Функция для преобразования пиксельных координат в 3D позицию на сфере
        function pixelToSphere(x, y, imgW, imgH, radius) {
            const u = x / imgW;                     // 0..1 слева направо
            const v = y / imgH;                     // 0..1 сверху вниз
            const theta = u * Math.PI * 2 - Math.PI; // долгота: -π ... +π (центр карты = 0°)
            const phi = Math.PI / 2 - v * Math.PI;   // широта: +π/2 (север) ... -π/2 (юг)
            const px = radius * Math.cos(phi) * Math.cos(theta);
            const py = radius * Math.sin(phi);
            const pz = radius * Math.cos(phi) * Math.sin(theta);
            return { x: px, y: py, z: pz };
        }
        
        async function initGlobe(resetView = true) {
            if (!dataLoaded || !mapImageReady) return false;
            destroyGlobe();
            
            const width = globeContainer.clientWidth, height = globeContainer.clientHeight;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: globeCanvas, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 1.0;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.minDistance = 2.2;
            controls.maxDistance = 8.0;
            controls.target.set(0, 0, 0);
            
            // Сфера с текстурой
            const geometry = new THREE.SphereGeometry(1.8, 256, 256);
            const texLoader = new THREE.TextureLoader();
            const mapTex = await new Promise(resolve => { texLoader.load('map.jpg', t => resolve(t)); });
            const material = createGlobeMaterial(mapTex);
            globeSphere = new THREE.Mesh(geometry, material);
            // Отключаем raycast для сферы, чтобы клики проходили сквозь неё к маркерам
            globeSphere.raycast = () => {};
            scene.add(globeSphere);
            
            // Создаём маркеры на сфере
            const R_marker = 1.83;
            const w = mapImageSize.width, h = mapImageSize.height;
            markers3D = [];
            
            for (let i = 0; i < markersData.length; i++) {
                const data = markersData[i];
                const pos = pixelToSphere(data.imgX, data.imgY, w, h, R_marker);
                
                let sprite;
                if (data.icon && data.icon.trim()) {
                    const iconTex = texLoader.load(data.icon);
                    const mat = new THREE.SpriteMaterial({ map: iconTex, depthTest: false });
                    sprite = new THREE.Sprite(mat);
                    sprite.scale.set(0.28, 0.28, 0.28);
                } else {
                    const canvas = document.createElement('canvas');
                    canvas.width = 80;
                    canvas.height = 80;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ff4466';
                    ctx.beginPath();
                    ctx.arc(40, 40, 34, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 40px "Segoe UI"';
                    ctx.fillText('●', 28, 58);
                    const tex = new THREE.CanvasTexture(canvas);
                    const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
                    sprite = new THREE.Sprite(mat);
                    sprite.scale.set(0.3, 0.3, 0.3);
                }
                sprite.position.set(pos.x, pos.y, pos.z);
                sprite.userData = {
                    index: i,
                    name: data.name,
                    visibleByCat: true
                };
                scene.add(sprite);
                markers3D.push(sprite);
                
                if (i < 5) {
                    console.log(`Маркер ${data.name}: пикс(${data.imgX},${data.imgY}) -> 3D(${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})`);
                }
            }
            
            // Устанавливаем видимость по категориям
            markers3D.forEach(m => {
                const cat = markersData[m.userData.index].category;
                m.userData.visibleByCat = activeCategories.has(cat);
            });
            updateVisibility3D();
            
            // Обработчик кликов на маркеры
            const raycaster = new THREE.Raycaster();
            const mouseVec = new THREE.Vector2();
            const onClick = (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouseVec.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouseVec.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouseVec, camera);
                const intersects = raycaster.intersectObjects(markers3D);
                if (intersects.length > 0) {
                    const idx = intersects[0].object.userData.index;
                    if (idx !== undefined) {
                        console.log('Клик по маркеру:', markersData[idx].name);
                        openSidebar(idx);
                    }
                }
            };
            renderer.domElement.addEventListener('click', onClick);
            
            // Начальная позиция камеры (освещённая сторона)
            if (resetView || firstGlobe || !savedGlobePos) {
                setDefaultGlobeView();
                firstGlobe = false;
                savedGlobePos = camera.position.clone();
                savedGlobeTarget = controls.target.clone();
            } else {
                camera.position.copy(savedGlobePos);
                controls.target.copy(savedGlobeTarget);
                controls.update();
            }
            
            function animate() {
                if (!globeMode) return;
                animationId = requestAnimationFrame(animate);
                controls.update();
                updateVisibility3D();
                renderer.render(scene, camera);
            }
            animate();
            return true;
        }
        
        function setDefaultGlobeView() {
            if (!controls || !camera || !planeNormal) return;
            // Направление на освещённую сторону (противоположное нормали плоскости затенения)
            const lightDir = planeNormal.clone().negate().normalize();
            camera.position.copy(lightDir.multiplyScalar(4.5));
            controls.target.set(0, 0, 0);
            controls.update();
        }
        
        function resetGlobeView() {
            if (globeMode && controls && camera) setDefaultGlobeView();
        }
        
        async function toggleGlobe() {
            if (!dataLoaded || !mapImageReady) {
                alert("Подождите загрузки данных...");
                return;
            }
            if (!globeMode) {
                if (controls && camera) {
                    savedGlobePos = camera.position.clone();
                    savedGlobeTarget = controls.target.clone();
                }
                globeMode = true;
                toggleGlobeBtn.textContent = "Карта";
                toggleShadeBtn.style.display = "inline-block";
                container.style.display = "none";
                globeContainer.style.display = "block";
                await initGlobe(false);
                resetBtn.onclick = () => { if (globeMode) resetGlobeView(); else setCoverAndCenter2D(); };
                toggleShadeBtn.onclick = () => {
                    shadeEnabled = !shadeEnabled;
                    toggleShadeBtn.textContent = shadeEnabled ? "Затенение" : "Затенение выкл";
                    updateShade();
                };
            } else {
                if (controls && camera) {
                    savedGlobePos = camera.position.clone();
                    savedGlobeTarget = controls.target.clone();
                }
                globeMode = false;
                toggleGlobeBtn.textContent = "Глобус";
                toggleShadeBtn.style.display = "none";
                globeContainer.style.display = "none";
                container.style.display = "block";
                destroyGlobe();
                applyFilter();
                setCoverAndCenter2D();
                updateMarkers2D();
                resetBtn.onclick = setCoverAndCenter2D;
            }
        }
        
        // ==================== 2D СОБЫТИЯ ====================
        function init2DEvents() {
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = container.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const ix = (mx - translateX) / scale, iy = (my - translateY) / scale;
                let ns = scale + (e.deltaY > 0 ? -0.1 : 0.1);
                ns = Math.min(maxScale, Math.max(minScale, ns));
                scale = ns;
                translateX = mx - ix * scale;
                translateY = my - iy * scale;
                clamp2D();
                updateTransform2D();
            }, { passive: false });
            container.addEventListener('mousedown', (e) => {
                e.preventDefault(); isDragging = true; container.classList.add('dragging');
                startX = e.clientX; startY = e.clientY; lastTranslateX = translateX; lastTranslateY = translateY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = lastTranslateX + (e.clientX - startX);
                translateY = lastTranslateY + (e.clientY - startY);
                clamp2D(); updateTransform2D();
            });
            window.addEventListener('mouseup', () => { isDragging = false; container.classList.remove('dragging'); });
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    e.preventDefault(); isDragging = true; container.classList.add('dragging');
                    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                    lastTranslateX = translateX; lastTranslateY = translateY;
                }
            });
            window.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                translateX = lastTranslateX + (e.touches[0].clientX - startX);
                translateY = lastTranslateY + (e.touches[0].clientY - startY);
                clamp2D(); updateTransform2D();
            });
            window.addEventListener('touchend', () => { isDragging = false; container.classList.remove('dragging'); });
            resetBtn.onclick = setCoverAndCenter2D;
            window.addEventListener('resize', () => {
                if (!globeMode && mapImageReady) setCoverAndCenter2D();
                else if (globeMode && renderer && camera) {
                    const w = globeContainer.clientWidth, h = globeContainer.clientHeight;
                    renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
                }
            });
        }
        
        // ==================== ЗАПУСК ====================
        (async () => {
            await waitForMap();
            await loadExcel();
            setCoverAndCenter2D();
            init2DEvents();
            closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && !e.target.classList?.contains('marker') && !e.target.classList?.contains('sprite'))
                    sidebar.classList.remove('open');
            });
            let filterOpen = false;
            filterIcon.addEventListener('click', (e) => {
                e.stopPropagation(); filterOpen = !filterOpen;
                const dots = document.querySelector('.icon-dots'), close = document.querySelector('.icon-close');
                if (filterOpen) { filterPanel.classList.add('open'); dots.style.display = 'none'; close.style.display = 'block'; }
                else { filterPanel.classList.remove('open'); dots.style.display = 'block'; close.style.display = 'none'; }
            });
            document.addEventListener('click', (e) => {
                if (!filterIcon.contains(e.target) && !filterPanel.contains(e.target) && filterOpen) {
                    filterOpen = false; filterPanel.classList.remove('open');
                    document.querySelector('.icon-dots').style.display = 'block';
                    document.querySelector('.icon-close').style.display = 'none';
                }
            });
            toggleGlobeBtn.addEventListener('click', toggleGlobe);
        })();
    </script>
</body>
</html>
