<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Интерактивная карта с фильтрацией</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
        }
        #map-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }
        #map-container.dragging {
            cursor: grabbing;
        }
        #map-image {
            position: absolute;
            width: auto;
            height: auto;
            transform-origin: 0 0;
            pointer-events: none;
        }
        #markers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            margin-left: -20px;
            margin-top: -20px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s;
        }
        .marker:hover {
            transform: scale(1.1);
        }
        /* Кнопка сброса вида */
        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: rgba(255,255,255,0.9);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #reset-btn:hover {
            background-color: white;
        }
        /* Круглая кнопка с тремя точками */
        .menu-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 25;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }
        .menu-button:hover {
            transform: scale(1.05);
            background-color: white;
        }
        .menu-button span {
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            transition: transform 0.2s;
        }
        /* Панель фильтров (появляется слева, на фоне карты) */
        .filters-panel {
            position: absolute;
            top: 74px; /* ниже кнопки + отступ */
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 16px;
            z-index: 24;
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 180px;
            transition: opacity 0.2s;
            pointer-events: auto;
        }
        .filters-panel.show {
            display: flex;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .filter-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .filter-item label {
            cursor: pointer;
        }
        /* Боковая панель */
        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 15px rgba(0,0,0,0.3);
            z-index: 30;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        .close-btn {
            align-self: flex-end;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #sidebar-title {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .sidebar-image {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin: 15px 0;
            background-color: #eee;
            border-radius: 6px;
        }
        .sidebar-text {
            background-color: #f9f9f9;
            padding: 12px;
            border-left: 4px solid #007bff;
            line-height: 1.4;
        }
        .error-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            z-index: 40;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <img id="map-image" src="map.jpg" alt="Карта">
        <div id="markers-container"></div>
    </div>
    <button id="reset-btn">Сбросить вид</button>

    <!-- Круглая кнопка с тремя точками -->
    <div id="menu-button" class="menu-button">
        <span>⋮</span>
    </div>

    <!-- Панель фильтров (появляется при клике) -->
    <div id="filters-panel" class="filters-panel"></div>

    <div id="sidebar">
        <button class="close-btn" id="close-sidebar">&times;</button>
        <h2 id="sidebar-title"></h2>
        <img id="sidebar-image" class="sidebar-image" style="display: none;" alt="">
        <div id="sidebar-text" class="sidebar-text"></div>
    </div>

    <script>
        // ==================== 1. ПОЛУЧЕНИЕ ССЫЛОК НА DOM-ЭЛЕМЕНТЫ ====================
        const container = document.getElementById('map-container');
        const mapImg = document.getElementById('map-image');
        const resetBtn = document.getElementById('reset-btn');
        const markersContainer = document.getElementById('markers-container');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('close-sidebar');
        const sidebarTitle = document.getElementById('sidebar-title');
        const sidebarImage = document.getElementById('sidebar-image');
        const sidebarText = document.getElementById('sidebar-text');

        const menuButton = document.getElementById('menu-button');
        const filtersPanel = document.getElementById('filters-panel');

        // ==================== 2. ПАРАМЕТРЫ ТРАНСФОРМАЦИИ КАРТЫ ====================
        let scale = 1;
        let minScale = 1;
        const maxScale = 5;
        let translateX = 0;
        let translateY = 0;

        let isDragging = false;
        let startX = 0, startY = 0;
        let lastTranslateX = 0, lastTranslateY = 0;

        // Массив для хранения данных маркеров (заполнится после загрузки Excel)
        let markersData = []; // каждый элемент: { name, imgX, imgY, description, imageUrl, icon, category }
        let markersElements = []; // ссылки на DOM-элементы маркеров для быстрого доступа

        // Хранилище фильтров: объект { category: boolean }
        let filters = {};

        // ==================== 3. ФУНКЦИИ ПОЗИЦИОНИРОВАНИЯ ====================
        function updateMarkers() {
            markersElements.forEach((marker, i) => {
                if (i >= markersData.length) return;
                const data = markersData[i];
                const x = data.imgX * scale + translateX;
                const y = data.imgY * scale + translateY;
                marker.style.left = x + 'px';
                marker.style.top = y + 'px';
            });
        }

        function updateTransform() {
            mapImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            updateMarkers();
        }

        function setCoverAndCenter() {
            const rect = container.getBoundingClientRect();
            const imgW = mapImg.naturalWidth;
            const imgH = mapImg.naturalHeight;
            if (!imgW || !imgH) return;

            const scaleX = rect.width / imgW;
            const scaleY = rect.height / imgH;
            minScale = Math.max(scaleX, scaleY);
            scale = minScale;

            translateX = (rect.width - imgW * scale) / 2;
            translateY = (rect.height - imgH * scale) / 2;

            updateTransform();
        }

        function clampTranslate() {
            const rect = container.getBoundingClientRect();
            const imgW = mapImg.naturalWidth * scale;
            const imgH = mapImg.naturalHeight * scale;

            const minX = rect.width - imgW;
            const maxX = 0;
            const minY = rect.height - imgH;
            const maxY = 0;

            translateX = Math.min(maxX, Math.max(minX, translateX));
            translateY = Math.min(maxY, Math.max(minY, translateY));
        }

        // ==================== 4. ФИЛЬТРАЦИЯ МАРКЕРОВ ====================
        function applyFilters() {
            markersElements.forEach((marker, idx) => {
                const data = markersData[idx];
                if (!data) return;
                const category = data.category;
                const show = filters[category] === true;
                marker.style.display = show ? 'block' : 'none';
            });
        }

        // Создаёт панель фильтров на основе уникальных категорий
        function buildFiltersPanel(categories) {
            filtersPanel.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'filter-item';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `filter-${cat}`;
                checkbox.checked = true;
                checkbox.addEventListener('change', (e) => {
                    filters[cat] = e.target.checked;
                    applyFilters();
                });
                const label = document.createElement('label');
                label.htmlFor = `filter-${cat}`;
                label.textContent = cat;
                div.appendChild(checkbox);
                div.appendChild(label);
                filtersPanel.appendChild(div);
                filters[cat] = true;
            });
        }

        // ==================== 5. ЗАГРУЗКА ДАННЫХ ИЗ EXCEL ====================
        async function loadMarkersFromExcel() {
            try {
                const response = await fetch('data.xlsx');
                if (!response.ok) throw new Error('Файл data.xlsx не найден');
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                if (!rows || rows.length < 2) throw new Error('Таблица пуста или нет данных');

                // Очищаем старые данные
                markersContainer.innerHTML = '';
                markersData = [];
                markersElements = [];
                filters = {};

                // Проходим по строкам, начиная со второй (первая — заголовок)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    // Поля: A, B, C, D, E, F
                    const name = row[0] ? row[0].toString().trim() : '';
                    const coordsStr = row[1] ? row[1].toString().trim() : '';
                    const imageUrl = row[2] ? row[2].toString().trim() : '';
                    const description = row[3] ? row[3].toString().trim() : '';
                    const icon = row[4] ? row[4].toString().trim() : '';
                    const category = row[5] ? row[5].toString().trim() : '';

                    if (!name && !coordsStr) continue;

                    const coords = coordsStr.split(';');
                    if (coords.length !== 2) {
                        console.warn(`Строка ${i+1}: неверный формат координат "${coordsStr}"`);
                        continue;
                    }
                    const imgX = parseFloat(coords[0]);
                    const imgY = parseFloat(coords[1]);
                    if (isNaN(imgX) || isNaN(imgY)) continue;

                    const markerData = {
                        name: name || 'Без названия',
                        imgX, imgY,
                        description: description || '',
                        imageUrl: imageUrl || '',
                        icon: icon || '',
                        category: category || 'без категории'
                    };
                    markersData.push(markerData);

                    // Создаём DOM-элемент маркера
                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    if (markerData.icon) {
                        marker.style.backgroundImage = `url('${markerData.icon}')`;
                        marker.style.backgroundColor = 'transparent';
                        marker.style.border = 'none';
                        marker.style.boxShadow = 'none';
                    } else {
                        marker.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
                        marker.style.border = '3px solid white';
                        marker.style.borderRadius = '50%';
                        marker.style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
                    }
                    marker.dataset.index = i - 1;
                    marker.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openSidebar(parseInt(marker.dataset.index));
                    });
                    markersContainer.appendChild(marker);
                    markersElements.push(marker);
                }

                if (markersData.length === 0) {
                    console.warn('Не найдено ни одного корректного маркера в Excel');
                    return;
                }

                // Собираем уникальные категории
                const uniqueCategories = [...new Set(markersData.map(m => m.category))];
                // Строим панель фильтров
                buildFiltersPanel(uniqueCategories);

                // Применяем фильтры (все категории включены по умолчанию)
                applyFilters();

                // Обновляем позиции маркеров после загрузки
                updateMarkers();
            } catch (err) {
                console.error('Ошибка загрузки Excel:', err);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = 'Не удалось загрузить данные из data.xlsx. Проверьте наличие файла и структуру таблицы.';
                document.body.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 5000);
            }
        }

        // ==================== 6. БОКОВАЯ ПАНЕЛЬ ====================
        function openSidebar(index) {
            if (!markersData[index]) return;
            const data = markersData[index];
            sidebarTitle.textContent = data.name;
            sidebarText.textContent = data.description || 'Описание отсутствует';

            if (data.imageUrl && data.imageUrl.trim() !== '') {
                sidebarImage.src = data.imageUrl;
                sidebarImage.alt = data.name;
                sidebarImage.style.display = 'block';
            } else {
                sidebarImage.style.display = 'none';
            }
            sidebar.classList.add('open');
        }

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !e.target.classList.contains('marker')) {
                sidebar.classList.remove('open');
            }
        });

        // ==================== 7. УПРАВЛЕНИЕ ПАНЕЛЬЮ ФИЛЬТРОВ ====================
        let menuOpen = false;
        menuButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if (menuOpen) {
                filtersPanel.classList.remove('show');
                menuButton.querySelector('span').textContent = '⋮';
                menuOpen = false;
            } else {
                filtersPanel.classList.add('show');
                menuButton.querySelector('span').textContent = '✕';
                menuOpen = true;
            }
        });

        // Закрытие панели фильтров при клике вне её и вне кнопки
        document.addEventListener('click', (e) => {
            if (menuOpen && !filtersPanel.contains(e.target) && e.target !== menuButton && !menuButton.contains(e.target)) {
                filtersPanel.classList.remove('show');
                menuButton.querySelector('span').textContent = '⋮';
                menuOpen = false;
            }
        });

        // ==================== 8. ОБРАБОТЧИКИ ВЗАИМОДЕЙСТВИЯ С КАРТОЙ ====================
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const imgX = (mouseX - translateX) / scale;
            const imgY = (mouseY - translateY) / scale;

            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            let newScale = scale + delta;
            if (newScale < minScale) newScale = minScale;
            if (newScale > maxScale) newScale = maxScale;

            scale = newScale;
            translateX = mouseX - imgX * scale;
            translateY = mouseY - imgY * scale;

            clampTranslate();
            updateTransform();
        }, { passive: false });

        container.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            container.classList.add('dragging');
            startX = e.clientX;
            startY = e.clientY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            translateX = lastTranslateX + dx;
            translateY = lastTranslateY + dy;
            clampTranslate();
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        window.addEventListener('mouseleave', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                container.classList.add('dragging');
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                lastTranslateX = translateX;
                lastTranslateY = translateY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            translateX = lastTranslateX + dx;
            translateY = lastTranslateY + dy;
            clampTranslate();
            updateTransform();
        });

        window.addEventListener('touchend', () => {
            isDragging = false;
            container.classList.remove('dragging');
        });

        resetBtn.addEventListener('click', setCoverAndCenter);

        window.addEventListener('resize', () => {
            if (mapImg.complete) setCoverAndCenter();
        });

        // ==================== 9. ИНИЦИАЛИЗАЦИЯ ====================
        if (mapImg.complete) {
            setCoverAndCenter();
        } else {
            mapImg.onload = setCoverAndCenter;
        }

        loadMarkersFromExcel();
    </script>
</body>
</html>
