<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Map</title>

<style>
body { margin:0; overflow:hidden; }
#globe { width:100vw; height:100vh; }
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
</head>

<body>

<div id="globe"></div>

<script>

// --------------------
// ДАННЫЕ (как у тебя)
// --------------------
const mapWidth = 2000;
const mapHeight = 1000;

// пример — у тебя остаётся свой источник
const markersData = [
  { x: 1000, y: 500, title: "Центр", icon: "" },
  { x: 1500, y: 400, title: "Точка", icon: "" }
];

// --------------------
// THREE
// --------------------
const container = document.getElementById('globe');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// свет
scene.add(new THREE.AmbientLight(0xffffff, 1));

// сфера
const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8, 64, 64),
  new THREE.MeshBasicMaterial({ wireframe:true, color:0x444444 })
);
scene.add(sphere);

// --------------------
// МАРКЕРЫ (ИСПРАВЛЕНО)
// --------------------
const markers = [];

markersData.forEach((m, i) => {

  // ✅ ПРАВИЛЬНОЕ преобразование (главный фикс)
  const lat = (0.5 - m.y / mapHeight) * Math.PI;
  const lon = (m.x / mapWidth - 0.5) * Math.PI * 2;

  const R = 1.9;

  const x = R * Math.cos(lat) * Math.sin(lon);
  const y = R * Math.sin(lat);
  const z = R * Math.cos(lat) * Math.cos(lon);

  let texture;

  if (m.icon) {
    texture = new THREE.TextureLoader().load(m.icon);
  } else {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(32,32,20,0,Math.PI*2);
    ctx.fill();
    texture = new THREE.CanvasTexture(canvas);
  }

  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map:texture, transparent:true })
  );

  sprite.position.set(x, y, z);
  sprite.scale.set(0.3, 0.3, 0.3);

  // ✅ ОБЯЗАТЕЛЬНО (фикс кликов)
  sprite.userData.index = i;

  scene.add(sprite);
  markers.push(sprite);
});

// --------------------
// КЛИКИ (ИСПРАВЛЕНО)
// --------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {

  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(markers, true);

  if (intersects.length > 0) {
    const index = intersects[0].object.userData.index;
    alert(markersData[index].title);
  }
});

// --------------------
// АНИМАЦИЯ
// --------------------
function animate() {
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.002;
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
